<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Расходы | Дашборд</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    <link rel="stylesheet" href="styles.css?v=52">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">💰</span>
                    <h1>Финансы</h1>
                </div>
                <div class="month-selector">
                    <button id="prevMonth" class="month-nav-btn" title="Предыдущий месяц">‹</button>
                    <div class="month-badge">
                        <span class="month-icon">📅</span>
                        <span id="currentMonth">Март 2026</span>
                    </div>
                    <button id="nextMonth" class="month-nav-btn" title="Следующий месяц">›</button>
                </div>
                <div class="sync-container">
                    <button id="currencyBtn" class="currency-btn" onclick="expenseDashboard.toggleCurrency()">
                        VND
                    </button>
                    <input type="file" id="mdFileInput" accept=".md" style="display: none;">
                    <button id="syncBtn" class="sync-btn">
                        <span class="sync-icon">🔄</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <section class="stats-grid">
                <div class="stat-card total-spent">
                    <div class="stat-icon">📊</div>
                    <div class="stat-info">
                        <span class="stat-label">Всего потрачено</span>
                        <span class="stat-value" id="totalSpent">0 ₫</span>
                        <span class="stat-sub" id="totalSpentUsd">~$0</span>
                    </div>
                </div>
                <div class="stat-card daily-avg">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <span class="stat-label">Среднее в день</span>
                        <span class="stat-value" id="dailyAvg">0 ₫</span>
                        <span class="stat-sub" id="dailyAvgUsd">~$0</span>
                    </div>
                </div>
                <div class="stat-card days-count">
                    <div class="stat-icon">📆</div>
                    <div class="stat-info">
                        <span class="stat-label">Дней учтено</span>
                        <span class="stat-value" id="daysCount">0</span>
                        <span class="stat-sub" id="daysProgress">из 31</span>
                    </div>
                </div>
                <div class="stat-card budget-left">
                    <div class="stat-icon">💵</div>
                    <div class="stat-info">
                        <span class="stat-label">Остаток бюджета</span>
                        <span class="stat-value" id="budgetLeft">$0</span>
                        <span class="stat-sub" id="budgetLeftText">95% осталось</span>
                        <div class="budget-progress-container">
                            <div class="budget-progress-bar" id="budgetProgressBar"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Charts Row -->
            <section class="charts-row">
                <div class="chart-card">
                    <h2 class="chart-title">📊 Структура расходов</h2>
                    <div class="chart-container">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h2 class="chart-title">📈 Расходы по дням</h2>
                    <div class="chart-container">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </section>



        </main>

        <!-- Modal for Category Details -->
        <div id="categoryModal" class="modal-overlay">
            <div class="modal-container">
                <div class="modal-header">
                    <div class="modal-title-group">
                        <span id="modalIcon" class="modal-icon"></span>
                        <h2 id="modalTitle">Детали категории</h2>
                    </div>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Detatils will be injected here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p id="footerLastUpdated">Последнее обновление: ---</p>
        </footer>
    </div>

    <!-- Month data files (loaded before registry) -->
    <script src="data/february_2026.js?v=52"></script>
    <script src="data/march_2026.js?v=52"></script>
    <script src="data/april_2026.js?v=52"></script>
    <!-- Registry & backward-compatible getter -->
    <script src="data.js?v=52"></script>
    <script src="app.js?v=52"></script>
</body>

</html>
